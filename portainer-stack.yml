version: "3.8"

services:
  vynl:
    image: ghcr.io/48nauts-operator/vynl-app:latest
    container_name: vynl
    restart: unless-stopped
    # Host networking is required for Sonos auto-discovery (SSDP multicast
    # does not traverse Docker's default bridge network). The app still
    # listens on port 3101.
    network_mode: host
    volumes:
      # Single mount for the whole Music share. Was previously three separate
      # bind mounts (library, library.db, podcasts) but that left /music/
      # itself owned by root inside the container, so SQLite couldn't create
      # its journal/WAL files next to library.db ("attempt to write a
      # readonly database"). Mounting the parent directory gives the
      # container the host's rwxrwxrwx on /volume1/Music.
      - /volume1/Music:/music
      # Persistent app data (survives container restarts)
      - vynl-data:/app/data
      - vynl-covers:/app/public/covers
      # Beets config — bind-mounted so plugin/path edits land in the
      # container without rebuilding. Source of truth in the repo is
      # beets-config.example.yaml; copy/rename it to
      # /volume1/Music/beets-config.yaml on the NAS.
      - /volume1/Music/beets-config.yaml:/home/vynl/.config/beets/config.yaml:ro
    environment:
      - MUSIC_LIBRARY_PATH=/music/library
      - BEETS_DB_PATH=/music/library.db
      - BEETS_PATH_REMAP=/Volumes/Music::/music
      - VYNL_DB_DIR=/app/data
      - PODCAST_STORAGE_PATH=/music/podcasts
      - VYNL_HOST=http://192.168.74.190:3101
      - NEXT_PUBLIC_VYNL_HOST=http://192.168.74.190:3101
      # Optional: uncomment and fill in for Spotify/AI features
      # - ANTHROPIC_API_KEY=
      # - SPOTIFY_CLIENT_ID=
      # - SPOTIFY_CLIENT_SECRET=
      # Optional. Set to the IP of any one Sonos speaker on the LAN if SSDP
      # discovery returns nothing (e.g. multicast blocked between VLANs).
      # The rest of the household is discovered via topology from this seed.
      # - SONOS_SEED_IP=192.168.74.226
      # Optional. GitHub PAT for the /github-stats page. Without it the page
      # still shows stars + release downloads, but the Traffic panel
      # (views/clones) stays hidden. PAT needs Metadata: read AND
      # Administration: read on 48Nauts-Operator/vynl-app.
      # - GH_STATS_PAT=github_pat_...

volumes:
  vynl-data:
  vynl-covers:
