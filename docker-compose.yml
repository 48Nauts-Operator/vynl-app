services:
  vynl:
    image: ghcr.io/48nauts-operator/vynl-app:latest
    # To build locally instead of pulling, comment out 'image' and uncomment 'build':
    # build: .
    container_name: vynl
    restart: unless-stopped
    # Host networking is required for Sonos auto-discovery (SSDP multicast
    # does not traverse Docker's default bridge network). The app still
    # listens on port 3101.
    network_mode: host
    volumes:
      # Music library (NAS mount or local path)
      - ${MUSIC_LIBRARY_PATH:-/mnt/music}/library:/music/library
      # Beets database
      - ${MUSIC_LIBRARY_PATH:-/mnt/music}/library.db:/music/library.db
      # Podcast storage
      - ${MUSIC_LIBRARY_PATH:-/mnt/music}/podcasts:/music/podcasts
      # Persistent app data (SQLite DB, covers cache, artist images)
      - vynl-data:/app/data
      - vynl-covers:/app/public/covers
      - vynl-artists:/app/public/artists
      # Beets config (optional — mount your existing config)
      - ${BEETS_CONFIG:-./beets-config.yaml}:/home/vynl/.config/beets/config.yaml:ro
    environment:
      - HOME=/home/vynl
      - BEETSDIR=/home/vynl/.config/beets
      - MUSIC_LIBRARY_PATH=/music/library
      - BEETS_DB_PATH=/music/library.db
      - BEETS_PATH_REMAP=/Volumes/Music::/music;/Volumes/Music-1::/music
      - VYNL_DB_DIR=/app/data
      - PODCAST_STORAGE_PATH=/music/podcasts
      - VYNL_HOST=http://${HOST_IP:-localhost}:3101
      - NEXT_PUBLIC_VYNL_HOST=http://${HOST_IP:-localhost}:3101
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
      # Optional. Set to the IP of any one Sonos speaker on the LAN if SSDP
      # discovery returns nothing (e.g. multicast blocked between VLANs).
      # The rest of the household is discovered via topology from this seed.
      - SONOS_SEED_IP=${SONOS_SEED_IP:-}
      # Optional. GitHub PAT for the /github-stats page. Without it the page
      # still shows stars + release downloads, but the Traffic panel
      # (views/clones) stays hidden. PAT needs Metadata: read AND
      # Administration: read on 48Nauts-Operator/vynl-app.
      - GH_STATS_PAT=${GH_STATS_PAT:-}

volumes:
  vynl-data:
  vynl-covers:
  vynl-artists:
