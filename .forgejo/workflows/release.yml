name: Release to GitHub

# Mirrors UAT (Forgejo's local-prod gate) to GitHub `main`, which triggers
# the GitHub Action that builds and publishes the Docker image to GHCR.
# Also creates a GitHub release tag named after the version in package.json.
#
# Required Forgejo Actions secrets:
#   SYNC_PAT — GitHub PAT with `contents: write` scope on
#                     48Nauts-Operator/vynl-app. Used to push commits +
#                     tags and create releases.

on:
  push:
    branches: [UAT]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read version from package.json
        id: ver
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "vynl-release-bot"
          git config user.email "release-bot@48nauts.com"

      - name: Add GitHub remote and push to main
        env:
          GITHUB_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          if [ -z "$GITHUB_PAT" ]; then
            echo "::error::SYNC_PAT secret is not set in Forgejo Actions"
            exit 1
          fi
          git remote add github "https://x-access-token:${GITHUB_PAT}@github.com/48Nauts-Operator/vynl-app.git"
          # Fetch first so --force-with-lease sees the current GitHub main SHA.
          git fetch github main
          echo "Pushing $(git rev-parse HEAD) to GitHub main..."
          # Force-with-lease overwrites GitHub main with UAT's HEAD.
          # Required because empty trigger commits on UAT make its history
          # diverge from main between releases; a regular push would fail
          # as non-fast-forward. Force-with-lease still refuses if main
          # was changed by anything other than what we last fetched, so
          # any genuinely surprising commits on main are preserved.
          git push github HEAD:main --force-with-lease=main:$(git rev-parse refs/remotes/github/main)

      - name: Create release tag (if new version)
        env:
          GITHUB_PAT: ${{ secrets.SYNC_PAT }}
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          if git ls-remote --tags github | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists on GitHub — skipping tag + release"
            exit 0
          fi
          git tag -a "${TAG}" -m "Release ${VERSION}"
          git push github "${TAG}"

      - name: Create / update GitHub release + attach assets
        env:
          GITHUB_PAT: ${{ secrets.SYNC_PAT }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          API="https://api.github.com/repos/48Nauts-Operator/vynl-app"
          UPLOADS="https://uploads.github.com/repos/48Nauts-Operator/vynl-app"
          AUTH=(-H "Authorization: Bearer ${GITHUB_PAT}" -H "Accept: application/vnd.github+json")

          # Find previous tag for the changelog range
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
            COMPARE="https://github.com/48Nauts-Operator/vynl-app/compare/${PREV_TAG}...${TAG}"
          else
            RANGE="${TAG}"
            COMPARE=""
          fi

          # Build changelog body grouped by conventional-commit prefix.
          # Excludes merges and the empty trigger commits we use on UAT.
          format_section() {
            local heading="$1" pattern="$2" lines
            lines=$(git log --no-merges --pretty=format:"%s" $RANGE \
              | grep -E "$pattern" \
              | grep -v -i "empty commit to trigger\|retrigger release" \
              | sed -E 's/^([a-z]+)(\([^)]+\))?: /- /' || true)
            if [ -n "$lines" ]; then printf '### %s\n%s\n\n' "$heading" "$lines"; fi
          }
          {
            echo "## What's in ${TAG}"
            echo
            format_section "Features"      "^feat(\([^)]+\))?:"
            format_section "Fixes"         "^fix(\([^)]+\))?:"
            format_section "Performance"   "^perf(\([^)]+\))?:"
            format_section "Refactor"      "^refactor(\([^)]+\))?:"
            format_section "Documentation" "^docs(\([^)]+\))?:"
            format_section "Build & CI"    "^(chore|build|ci)(\([^)]+\))?:"
            [ -n "$COMPARE" ] && echo "**Full Changelog**: ${COMPARE}"
          } > /tmp/release-body.md
          BODY=$(jq -Rs . < /tmp/release-body.md)

          # Create or update the release; capture the id
          REL=$(curl -sS "${AUTH[@]}" "${API}/releases/tags/${TAG}")
          RELEASE_ID=$(echo "$REL" | jq -r '.id // empty')
          if [ -z "$RELEASE_ID" ]; then
            REL=$(curl -fsS -X POST "${AUTH[@]}" "${API}/releases" \
              -d "{\"tag_name\":\"${TAG}\",\"name\":\"Vynl ${TAG}\",\"body\":${BODY}}")
            RELEASE_ID=$(echo "$REL" | jq -r '.id')
            echo "Created release ${TAG} (id=${RELEASE_ID})"
          else
            curl -fsS -X PATCH "${AUTH[@]}" "${API}/releases/${RELEASE_ID}" \
              -d "{\"body\":${BODY}}" > /dev/null
            echo "Updated release ${TAG} (id=${RELEASE_ID})"
          fi

          # Attach downloadable assets. Skipped if same-name asset already
          # exists (GitHub disallows duplicate asset names per release).
          EXISTING=$(echo "$REL" | jq -r '.assets[]?.name // empty')
          for asset in docker-compose.yml portainer-stack.yml; do
            if echo "$EXISTING" | grep -qx "$asset"; then
              echo "Asset ${asset} already attached — skipping"
              continue
            fi
            if [ ! -f "$asset" ]; then
              echo "::warning::${asset} not found in repo — skipping"
              continue
            fi
            echo "Uploading ${asset}..."
            curl -fsS -X POST "${AUTH[@]}" \
              -H "Content-Type: application/x-yaml" \
              --data-binary @"$asset" \
              "${UPLOADS}/releases/${RELEASE_ID}/assets?name=${asset}" \
              | jq -r '"  ✓ \(.name) (\(.size) bytes)"'
          done
