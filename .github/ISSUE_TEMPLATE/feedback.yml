name: 👍 Feedback
description: Tell us what's working or not working — short form
title: "[Feedback]: "
labels: ["feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Anything short — a thing that delighted you, a thing that confused you,
        a thing that almost-but-didn't-quite work. For bugs or feature requests,
        the other templates are better.

  - type: textarea
    id: feedback
    attributes:
      label: What you want to say
    validations:
      required: true

  - type: dropdown
    id: sentiment
    attributes:
      label: General sentiment
      options:
        - 🎉 Loved it
        - 👍 Mostly positive
        - 😐 Neutral / mixed
        - 😕 Confusing
        - 🐛 Almost broke
    validations:
      required: false
