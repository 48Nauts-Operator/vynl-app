name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["feature", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Who is it for?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work? Sketch the UX or API.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Library / scanning
        - Playback / audio
        - Artists / metadata
        - Playlists / DJ
        - Import / export
        - UI / frontend
        - Docker / deployment
        - Other
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Mockups, references, related issues.
    validations:
      required: false
