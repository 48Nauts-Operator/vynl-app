name: Build & Publish Docker Image

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Docker Hub mirror is opt-in: build only pushes there if both
  # DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repo secrets are set.
  # Why: GHCR doesn't expose pull counts publicly; Docker Hub does.
  # Mirroring gives us a real "how many people run Vynl" number.
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME && format('{0}/vynl-app', secrets.DOCKERHUB_USERNAME) || '' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercase the username — Docker Hub auth signs the header
      # case-sensitively and capitalised usernames trip "malformed
      # HTTP Authorization header". Cheap fix: normalise before
      # passing into docker/login-action.
      - name: Normalise Docker Hub username
        if: ${{ env.DOCKERHUB_IMAGE != '' }}
        run: |
          lower=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          echo "DOCKERHUB_USERNAME_LC=$lower" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_IMAGE != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME_LC }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # When DOCKERHUB_IMAGE is set, the metadata-action emits tags
          # for BOTH registries from one input list (newline-separated).
          # When unset, only GHCR tags are produced.
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
